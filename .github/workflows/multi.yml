name: multi
on: [push]

jobs:
    job1:
        name: First job
        runs-on: ubuntu-latest
        steps:
            - name: step one
              uses: actions/checkout@v4
            - name: setup node
              uses: actions/setup-node@v6
              with:
                  node-version: "22"
            - run: npm install
            - run: npm ci
            - run: npm test
    job2:
        name: Second job
        needs: job1
        runs-on: ubuntu-latest

        steps:
            - name: Print hello world
              run: echo "Hello, world"
